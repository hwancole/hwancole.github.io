<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>hwancole · 프로젝트 허브</title>
<meta name="description" content="hwancole의 웹 프로젝트 모음 — 바로 열어볼 수 있는 라이브 사이트들">
<style>
:root{
  --navy:#0E3A4F; --navy2:#0E4D64; --teal:#0E7C86; --tealb:#19A0A8;
  --paper:#F4F7F8; --card:#fff; --ink:#16252B; --muted:#5E7681; --line:#DCE6E9;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  font-family:-apple-system,"Apple SD Gothic Neo","Pretendard","Malgun Gothic","Noto Sans KR",system-ui,sans-serif;
  background:var(--paper); color:var(--ink); line-height:1.5; -webkit-text-size-adjust:100%;
  min-height:100vh;
}
a{text-decoration:none;color:inherit}

/* hero */
.hero{
  background:linear-gradient(160deg,#0E3A4F 0%,#0E4D64 55%,#0E7C86 140%);
  color:#fff;padding:46px 20px 38px;border-radius:0 0 22px 22px;position:relative;overflow:hidden;
  text-align:center;
}
.hero:after{content:"";position:absolute;right:-50px;top:-50px;width:200px;height:200px;
  border:2px solid rgba(255,255,255,.12);border-radius:50%}
.hero:before{content:"";position:absolute;left:-40px;bottom:-70px;width:160px;height:160px;
  border:2px solid rgba(255,255,255,.10);border-radius:50%}
.hero .eyebrow{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:#BFE3E7;margin:0 0 8px}
.hero h1{margin:0;font-size:27px;font-weight:800;letter-spacing:-.01em}
.hero p{margin:10px 0 0;font-size:13px;color:#D7EAEC}

.wrap{max-width:680px;margin:0 auto;padding:22px 16px 50px}
.lead{font-size:12.5px;color:var(--muted);text-align:center;margin:4px 0 20px}

/* project cards */
.grid{display:flex;flex-direction:column;gap:14px}
.proj{
  display:flex;align-items:center;gap:15px;background:var(--card);border:1px solid var(--line);
  border-radius:18px;padding:16px 16px;box-shadow:0 1px 3px rgba(14,58,79,.05);
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.proj:active{transform:scale(.985)}
.icon{flex:0 0 auto;width:54px;height:54px;border-radius:14px;display:grid;place-items:center;
  font-size:27px;color:#fff}
.pc{flex:1;min-width:0}
.pc .nm{font-size:16px;font-weight:800;line-height:1.25}
.pc .ds{font-size:12px;color:var(--muted);margin-top:3px}
.pc .url{font-size:11px;color:var(--teal);margin-top:5px;word-break:break-all}
.go{flex:0 0 auto;display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;
  color:#fff;background:var(--navy2);border-radius:999px;padding:8px 13px;white-space:nowrap}
@media(min-width:620px){
  .proj:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(14,58,79,.10);border-color:var(--tealb)}
}
@media (prefers-reduced-motion: reduce){ .proj{transition:none} .proj:active{transform:none} }
.proj:focus-visible{outline:3px solid var(--tealb);outline-offset:2px}

.foot{text-align:center;font-size:11.5px;color:var(--muted);margin-top:26px}
.foot a{color:var(--teal);font-weight:700}
</style>
</head>
<body>
<header class="hero">
  <p class="eyebrow">my web projects</p>
  <h1>hwancole</h1>
  <p>바로 열어볼 수 있는 프로젝트 모음 · tap to open</p>
</header>

<main class="wrap">
  <p class="lead">아래 카드를 누르면 해당 사이트가 열려요.</p>
  <nav class="grid" id="grid"></nav>
  <p class="foot">
    더 많은 코드는 <a href="https://github.com/hwancole" target="_blank" rel="noopener">github.com/hwancole ↗</a>
  </p>
</main>

<script>
/* ---- projects (edit this list to add/remove cards) ---- */
var PROJECTS=[
  {
    nm:"Sydney Trip · 시드니 여행",
    ds:"시드니 7박 8일 인터랙티브 여행 일정 · 지도·체크리스트",
    href:"https://hwancole.github.io/sydney-trip/",
    icon:"🇦🇺", color:"#0E7C86"
  },
  {
    nm:"타갈로그어 100일 마스터",
    ds:"필리핀어(타갈로그) 100일 학습 웹앱",
    href:"https://hwancole.github.io/tagalog-100/",
    icon:"🗣️", color:"#2F6DB0"
  },
  {
    nm:"미니 게임 아케이드",
    ds:"브라우저에서 바로 즐기는 미니 게임 모음",
    href:"https://hwancole.github.io/mini-game-arcade/",
    icon:"🎮", color:"#8E5BA6"
  }
];

var grid=document.getElementById('grid');
PROJECTS.forEach(function(p){
  var a=document.createElement('a');
  a.className='proj'; a.href=p.href; a.target='_blank'; a.rel='noopener';
  a.setAttribute('aria-label', p.nm + ' 열기');
  a.innerHTML=''
    +'<span class="icon" style="background:'+p.color+'">'+p.icon+'</span>'
    +'<span class="pc">'
    +'  <span class="nm">'+p.nm+'</span>'
    +'  <span class="ds">'+p.ds+'</span>'
    +'  <span class="url">'+p.href.replace(/^https:\/\//,'')+'</span>'
    +'</span>'
    +'<span class="go">열기 ↗</span>';
  grid.appendChild(a);
});
</script>
</body>
</html>
