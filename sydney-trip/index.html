<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5">
<meta name="theme-color" content="#0E3A4F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="시드니 7박 8일 인터랙티브 여행 일정 · 일정·장소·지도·체크리스트 (편집 가능, 기기에 저장)">
<title>Sydney Trip · 시드니 여행</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
:root{
  --navy:#0E3A4F; --navy2:#0E4D64; --teal:#0E7C86; --tealb:#19A0A8;
  --sand:#D9C7A0; --sandsoft:#EFE7D4; --paper:#F4F7F8; --card:#fff;
  --ink:#16252B; --muted:#5E7681; --line:#DCE6E9; --coral:#E8734A;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  font-family:-apple-system,"Apple SD Gothic Neo","Pretendard","Malgun Gothic","Noto Sans KR",system-ui,sans-serif;
  background:var(--paper); color:var(--ink); line-height:1.5;
  -webkit-text-size-adjust:100%; -webkit-tap-highlight-color:transparent;
  overflow-x:hidden;
}
a{color:var(--teal);text-decoration:none}
.wrap{max-width:760px;margin:0 auto;
  padding:0 calc(14px + env(safe-area-inset-right)) 60px calc(14px + env(safe-area-inset-left))}

/* Hero */
.hero{
  background:linear-gradient(160deg,#0E3A4F 0%,#0E4D64 55%,#0E7C86 140%);
  color:#fff;padding:26px 18px 20px;border-radius:0 0 20px 20px;
  position:relative;overflow:hidden;
}
.hero:after{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;
  border:2px solid rgba(255,255,255,.12);border-radius:50%}
.hero .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#BFE3E7;margin:0 0 6px}
.hero h1{margin:0;font-size:25px;font-weight:800;letter-spacing:-.01em}
.hero .meta{margin:8px 0 0;font-size:12.5px;color:#D7EAEC}
.hero .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.chip{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.18);
  border-radius:999px;padding:5px 11px;font-size:11.5px;color:#fff}
.chip b{color:#fff}
.chip.cust{background:rgba(232,115,74,.30);border-color:rgba(232,115,74,.5)}

/* progress */
.prog{margin-top:14px}
.prog .bar{height:8px;background:rgba(255,255,255,.18);border-radius:999px;overflow:hidden}
.prog .fill{height:100%;width:0;background:linear-gradient(90deg,#7FE0D6,#19A0A8);transition:width .35s}
.prog .lbl{font-size:11.5px;color:#CDE7E9;margin-top:6px;display:flex;justify-content:space-between}

/* tabs */
.tabs{position:sticky;top:0;z-index:40;background:var(--paper);
  display:flex;gap:5px;padding:10px 0 8px;margin-top:6px;border-bottom:1px solid var(--line)}
.tab{flex:1;text-align:center;padding:10px 4px;border-radius:11px;font-size:12.5px;font-weight:700;
  color:var(--muted);background:transparent;border:1px solid transparent;cursor:pointer;
  white-space:nowrap;min-height:42px;-webkit-appearance:none}
.tab.active{color:#fff;background:var(--navy2)}
.tab:focus-visible{outline:3px solid var(--tealb);outline-offset:1px}
.panel{display:none;padding-top:14px}
.panel.active{display:block}

/* day card */
.day{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:12px;overflow:hidden;
  box-shadow:0 1px 2px rgba(14,58,79,.04)}
.dhead{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer;user-select:none}
.daydot{flex:0 0 auto;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;
  color:#fff;font-weight:800;font-size:13px}
.dhead .h{flex:1;min-width:0}
.dhead .dno{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.dhead .dt{font-size:14.5px;font-weight:800;line-height:1.25}
.dhead .de{font-size:11.5px;color:var(--muted)}
.dhead .cnt{font-size:11px;color:var(--muted);background:var(--paper);border:1px solid var(--line);
  border-radius:999px;padding:3px 8px;white-space:nowrap}
.chev{transition:transform .25s;color:var(--muted);flex:0 0 auto}
.day.open .chev{transform:rotate(90deg)}
.cap{font-size:11px;color:var(--navy2);background:var(--sandsoft);padding:4px 14px;border-top:1px solid #ECE3CF;border-bottom:1px solid #ECE3CF}
.body{display:none;padding:6px 6px 10px}
.day.open .body{display:block}

/* timeline */
.thread{position:relative;padding-left:8px}
.stop{position:relative;display:flex;gap:11px;padding:8px 8px 8px 10px;border-radius:11px}
.stop:active{background:#F0F6F7}
.rail{position:relative;flex:0 0 auto;width:36px;display:flex;flex-direction:column;align-items:center}
.rail .time{font-size:10.5px;font-weight:700;color:var(--teal);white-space:nowrap;margin-bottom:4px}
.node{width:14px;height:14px;border-radius:50%;border:3px solid var(--teal);background:#fff;flex:0 0 auto;z-index:2}
.node.done{background:var(--teal)}
.rail .line{position:absolute;top:24px;bottom:-8px;width:2px;background:var(--line);z-index:1}
.scon{flex:1;min-width:0}
.sk{font-size:13.5px;font-weight:600}
.se{font-size:11.5px;color:var(--muted);margin-top:1px}
.tagfree{display:inline-block;font-size:10px;font-weight:700;color:#2C7A4B;background:#E4F4EA;border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:1px}
.act{display:flex;gap:8px;align-items:center;margin-top:7px;flex-wrap:wrap}
.btn{font-size:11.5px;font-weight:700;border:1px solid var(--line);background:#fff;color:var(--navy2);
  border-radius:999px;padding:5px 11px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.btn.map{color:var(--teal)}
.cbox{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;user-select:none;min-height:30px;padding:2px 2px}
.cbox input{width:19px;height:19px;accent-color:var(--teal)}
.stop.done .sk{color:var(--muted);text-decoration:line-through;text-decoration-color:#B9CCD1}
.move{display:flex;gap:9px;align-items:flex-start;padding:2px 8px 2px 10px;color:#2F7B86}
.move .rail2{width:36px;display:flex;justify-content:center;flex:0 0 auto}
.move .seg{width:2px;background:repeating-linear-gradient(var(--line) 0 4px,transparent 4px 8px)}
.move .mt{font-size:11px;font-style:italic;color:#3E7C86;padding:3px 0}
.sub{font-size:10.5px;color:#7C8C93;padding:2px 10px 2px 56px}

/* map */
#map{height:62vh;min-height:380px;border-radius:16px;border:1px solid var(--line);overflow:hidden;z-index:1}
.mapnote{font-size:11.5px;color:var(--muted);margin:10px 2px 12px}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 12px}
.lg{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink);
  border:1px solid var(--line);background:#fff;border-radius:999px;padding:4px 10px;cursor:pointer}
.lg .sw{width:11px;height:11px;border-radius:50%}
.lg.off{opacity:.4}

/* checklist + cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:12px}
.card h3{margin:0 0 4px;font-size:15px;color:var(--navy2)}
.card .sc{font-size:11.5px;color:var(--muted);margin:0 0 10px}
.cl{list-style:none;margin:0;padding:0}
.cl li{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #EEF3F4}
.cl li:last-child{border-bottom:none}
.cl input{width:18px;height:18px;margin-top:1px;accent-color:var(--teal);flex:0 0 auto}
.cl .t{font-size:13px}
.cl .t .en{display:block;font-size:11px;color:var(--muted)}
.cl li.done .t{color:var(--muted);text-decoration:line-through;text-decoration-color:#C3D4D8}
.costgrid{display:flex;flex-direction:column;gap:7px}
.costrow{display:flex;justify-content:space-between;font-size:12.5px;border-bottom:1px dashed var(--line);padding-bottom:6px}
.costrow b{color:var(--navy2)}
.tip{font-size:12px;color:var(--ink);padding:7px 0;border-bottom:1px solid #EEF3F4}
.tip:last-child{border:none}
.tip b{color:var(--teal)}
.tip .en{display:block;font-size:10.5px;color:var(--muted)}
.foot{text-align:center;font-size:11px;color:var(--muted);margin-top:18px}
.reset{font-size:11px;color:var(--muted);background:none;border:none;text-decoration:underline;cursor:pointer}

/* places tab */
.psum{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 2px 12px;flex-wrap:wrap}
.psum .ct{font-size:12.5px;color:var(--muted)}
.psum .ct b{color:var(--navy2);font-size:14px}
.ptoggle{font-size:11.5px;font-weight:700;color:var(--navy2);background:#fff;border:1px solid var(--line);
  border-radius:999px;padding:7px 12px;cursor:pointer;min-height:34px}
.ptoggle.on{color:#fff;background:var(--teal);border-color:var(--teal)}
.pday{margin-bottom:14px}
.pday .ph{display:flex;align-items:center;gap:8px;margin:0 2px 7px}
.pday .pdot{width:13px;height:13px;border-radius:50%;flex:0 0 auto}
.pday .pt{font-size:12.5px;font-weight:800;color:var(--ink)}
.pday .pte{font-size:11px;color:var(--muted)}
.place{display:flex;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:12px 13px;margin-bottom:8px;align-items:flex-start}
.place .pchk{flex:0 0 auto;display:flex;align-items:center;min-height:24px}
.place .pchk input{width:21px;height:21px;accent-color:var(--teal)}
.place .pbody{flex:1;min-width:0}
.place .pnm{font-size:13.5px;font-weight:700;line-height:1.3}
.place .pen{font-size:11.5px;color:var(--muted);margin-top:1px}
.place .pmeta{font-size:11px;color:#6A828B;margin-top:5px;display:flex;flex-wrap:wrap;gap:4px 10px}
.place .pmeta .geo{font-variant-numeric:tabular-nums}
.place .pacts{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
.place.done{opacity:.62}
.place.done .pnm{text-decoration:line-through;text-decoration-color:#B9CCD1;color:var(--muted)}
.bsm{font-size:11.5px;font-weight:700;border:1px solid var(--line);background:#fff;color:var(--navy2);
  border-radius:999px;padding:7px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;min-height:34px}
.bsm.gmap{color:var(--teal)}
.bsm.onmap{color:var(--coral);border-color:#F2D2C6}
.hidden{display:none!important}

/* edit mode */
.editbar{display:flex;align-items:center;gap:10px;margin:0 2px 12px;flex-wrap:wrap}
.editbar .hint{font-size:11.5px;color:var(--muted);flex:1;min-width:120px}
.ebtn{font-size:12.5px;font-weight:800;border:1px solid var(--teal);background:#fff;color:var(--teal);
  border-radius:999px;padding:9px 14px;cursor:pointer;min-height:40px}
.ebtn.on{background:var(--coral);border-color:var(--coral);color:#fff}
.ebtn.danger{border-color:#C0392B;color:#C0392B}
.dayedit{display:flex;gap:6px;flex-wrap:wrap;padding:8px 12px;background:#FBF7EE;border-bottom:1px solid #ECE3CF}
.stopedit{display:flex;gap:6px;flex-wrap:wrap;padding:2px 8px 8px 56px}
.addrow{padding:2px 8px 10px 56px}
.minib{font-size:11.5px;font-weight:700;border:1px solid var(--line);background:#fff;color:var(--navy2);
  border-radius:8px;padding:7px 11px;cursor:pointer;min-height:34px}
.minib.del{color:#C0392B;border-color:#EBC8C2}
.minib.add{color:var(--teal);border-color:#BFE3E7;border-style:dashed;width:100%}
.minib.mv{min-width:40px;font-size:14px}

/* modal / bottom sheet */
.modal{position:fixed;inset:0;z-index:100;background:rgba(14,37,47,.55);display:none;
  align-items:flex-end;justify-content:center}
.modal.show{display:flex}
.sheet{background:#fff;width:100%;max-width:560px;border-radius:18px 18px 0 0;
  padding:18px 16px calc(20px + env(safe-area-inset-bottom));max-height:92vh;overflow:auto}
.sheet h3{margin:0 0 14px;font-size:16px;color:var(--navy2)}
.fld{margin-bottom:11px}
.fld label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:4px}
.fld input,.fld textarea,.fld select{width:100%;font:inherit;font-size:15px;padding:11px 11px;
  border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)}
.fld textarea{min-height:52px;resize:vertical;line-height:1.4}
.fld.row{display:flex;gap:10px}
.fld.row>div{flex:1}
.sheet .actions{display:flex;gap:8px;margin-top:16px}
.sheet .actions button{flex:1;font-size:15px;font-weight:800;border-radius:11px;padding:13px;cursor:pointer;
  border:1px solid var(--line);background:#fff;color:var(--navy2);min-height:48px}
.sheet .actions .save{background:var(--teal);border-color:var(--teal);color:#fff}

/* language switch */
.langsw{position:absolute;top:15px;right:15px;display:flex;background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.3);border-radius:999px;padding:3px;z-index:3}
.langsw button{border:none;background:transparent;color:#E2F2F3;font-size:11.5px;font-weight:800;
  padding:6px 11px;border-radius:999px;cursor:pointer;min-height:30px}
.langsw button.on{background:#fff;color:#0E4D64}
.langsw button:focus-visible{outline:2px solid #fff;outline-offset:1px}
.hero .eyebrow{padding-right:96px}
.hero h1{padding-right:96px}

/* small UI/UX polish */
.tab{transition:background .15s,color .15s}
.tab.active{box-shadow:0 2px 8px rgba(14,77,100,.25)}
.day{transition:box-shadow .18s}
.btn,.bsm,.minib,.ebtn,.ptoggle{transition:transform .12s,background .15s,border-color .15s}
.btn:active,.bsm:active,.minib:active,.ebtn:active,.ptoggle:active{transform:scale(.96)}
.cbox input:focus-visible,.btn:focus-visible,.bsm:focus-visible,.minib:focus-visible,.ebtn:focus-visible,.ptoggle:focus-visible,.dhead:focus-visible{outline:3px solid var(--tealb);outline-offset:2px}
.fld input:focus,.fld textarea:focus,.fld select:focus{outline:none;border-color:var(--tealb);box-shadow:0 0 0 3px rgba(25,160,168,.15)}
.lang-en .sk,.lang-en .pnm{word-break:break-word}

@media(min-width:620px){
  .stop:hover{background:#F0F6F7} .lg:hover{border-color:var(--teal)} .place:hover{border-color:var(--tealb)}
  .day:hover{box-shadow:0 4px 14px rgba(14,58,79,.08)}
  .modal{align-items:center} .sheet{border-radius:18px}
}
@media (prefers-reduced-motion: reduce){ *{transition:none!important} .btn:active,.bsm:active,.minib:active,.ebtn:active,.ptoggle:active{transform:none} }
</style>
</head>
<body>
<div class="hero">
  <div class="langsw" id="langsw" role="group" aria-label="Language">
    <button type="button" data-lang="ko">한국어</button>
    <button type="button" data-lang="en">EN</button>
  </div>
  <p class="eyebrow" data-i18n="hero_eyebrow"></p>
  <h1>Sydney Trip · 시드니 여행</h1>
  <p class="meta" data-i18n="hero_meta"></p>
  <div class="chips" id="chips"></div>
  <div class="prog">
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="lbl"><span id="progtxt"></span><span id="progHint" data-i18n="prog_hint"></span></div>
  </div>
</div>

<div class="wrap">
  <div class="tabs">
    <button class="tab active" data-tab="plan" data-i18n="tab_plan"></button>
    <button class="tab" data-tab="places" data-i18n="tab_places"></button>
    <button class="tab" data-tab="map" data-i18n="tab_map"></button>
    <button class="tab" data-tab="check" data-i18n="tab_check"></button>
  </div>

  <div class="panel active" id="plan"></div>

  <div class="panel" id="places">
    <div class="psum">
      <span class="ct" id="psumtxt"></span>
      <button class="ptoggle" id="ponly"></button>
    </div>
    <div id="placelist"></div>
    <p class="mapnote" id="placesNote" data-i18n="places_note"></p>
  </div>

  <div class="panel" id="map-panel">
    <div class="legend" id="legend"></div>
    <div id="map"></div>
    <p class="mapnote" id="mapNote" data-i18n="map_note"></p>
  </div>

  <div class="panel" id="check">
    <div class="card">
      <h3 data-i18n="prep_title"></h3>
      <p class="sc" data-i18n="prep_sc"></p>
      <ul class="cl" id="prep"></ul>
    </div>
    <div class="card">
      <h3 data-i18n="pack_title"></h3>
      <ul class="cl" id="pack"></ul>
    </div>
    <div class="card">
      <h3 data-i18n="cost_title"></h3>
      <div class="costgrid">
        <div class="costrow"><span data-i18n="cost_transport"></span><b>≈ $87</b></div>
        <div class="costrow"><span data-i18n="cost_sealife"></span><b>≈ $44</b></div>
        <div class="costrow"><span data-i18n="cost_garden"></span><b>$12</b></div>
        <div class="costrow"><span data-i18n="cost_tower"></span><b>≈ $25</b></div>
        <div class="costrow" style="border:none"><span data-i18n="cost_else"></span><b data-i18n="cost_free"></b></div>
      </div>
      <p class="sc" style="margin-top:10px" data-i18n="cost_combo"></p>
    </div>
    <div class="card">
      <h3 data-i18n="tips_title"></h3>
      <div id="tips"></div>
      <div style="text-align:right;margin-top:10px"><button class="reset" id="reset" data-i18n="reset_checks"></button></div>
    </div>
  </div>

  <p class="foot" data-i18n="footer"></p>
</div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

var MEM_LANG=null;
function loadLang(){ try{return localStorage.getItem('sydtrip_lang')||MEM_LANG;}catch(e){return MEM_LANG;} }

var lang=loadLang(); if(lang!=='en'&&lang!=='ko'){ lang='ko'; }

 chip_transit:"교통 주간상한 $50", chip_entry:"유료입장 ≈$81", chip_whale:"겨울=고래 시즌", chip_custom:"내 맞춤 일정",
 prog_hint:"탭하면 저장돼요", prog_txt:"방문 체크 {d} / {t}  ({p}%)",
 tab_plan:"일정", tab_places:"장소", tab_map:"지도", tab_check:"체크리스트",
 edit_on:"✏️ 일정 편집하기", edit_done:"✅ 편집 완료",
 edit_hint_on:"추가·수정·삭제·순서 변경 가능 · 변경은 이 기기에 저장돼요.", edit_hint_off:"내 여행에 맞게 일정을 바꿀 수 있어요. (이 기기에 저장)",
 btn_visit:"들름", btn_map:"📍 지도",
 day_info:"✎ 날짜 정보", day_del:"🗑 날짜 삭제", add_stop:"+ 이 날에 일정 추가", add_day:"+ 날짜 추가", reset_iti:"↺ 기본 일정으로 되돌리기",

/* ---------- centralized check sync: itinerary <-> places <-> progress ---------- */
function setStop(id,checked){
  setOn(id,checked);
  document.querySelectorAll('input[data-id="'+id+'"]').forEach(function(cb){ if(cb.checked!==checked) cb.checked=checked; });
  var row=document.getElementById('row_'+id); if(row) row.classList.toggle('done',checked);
  var node=document.getElementById('node_'+id);
  if(node){ node.classList.toggle('done',checked); node.style.background=checked?node.style.borderColor:'#fff'; }
  var prow=document.getElementById('prow_'+id); if(prow) prow.classList.toggle('done',checked);
  updateProgress();
}
plan.addEventListener('change',function(e){
  if(e.target.matches('input[type=checkbox]')){ setStop(e.target.dataset.id, e.target.checked); }
});
plan.addEventListener('click',function(e){
  var b=e.target.closest('button[data-act]'); if(!b) return;
  handleEditAction(b.dataset.act, b);
});

function updateProgress(){
  var done=0, total=0;
  DAYS.forEach(function(day,di){
    var dd=0, tot=0;
    day.stops.forEach(function(s){ if(s.sub)return; tot++; total++; if(isOn(s.id)){dd++;done++;} });
    var el=document.getElementById('cnt'+di); if(el) el.textContent=dd+'/'+tot;
  });
  var pct=total?Math.round(done/total*100):0;
  document.getElementById('fill').style.width=pct+'%';
  document.getElementById('progtxt').textContent=t('prog_txt').replace('{d}',done).replace('{t}',total).replace('{p}',pct);
  refreshPlaces();
}

function commit(){ saveItinerary(); markCustomized(); renderPlaces(); renderPlan(); destroyMap(); }
function renderChips(){
  var chips=document.getElementById('chips'); if(!chips) return;
  chips.innerHTML='<span class="chip">🚆 <b>'+esc(t('chip_transit'))+'</b></span>'
    +'<span class="chip">🎟 <b>'+esc(t('chip_entry'))+'</b></span>'

  if(customized){ chips.innerHTML+='<span class="chip cust" id="custChip">✎ <b>'+esc(t('chip_custom'))+'</b></span>'; }
}
function markCustomized(){ if(customized) return; customized=true; renderChips(); }
function handleEditAction(act, el){
  var di=el.dataset.di!=null?+el.dataset.di:-1;
  var si=el.dataset.si!=null?+el.dataset.si:-1;
  switch(act){
    case 'toggleedit': editMode=!editMode; renderPlan(); break;
    case 'addday':
      DAYS.push({date:t('new_day_date'),tk:'새 날짜',te:'New day',cap:t('new_day_cap'),stops:[]});
      openState[DAYS.length-1]=true; commit(); break;
    case 'resetiti':
      if(confirm(t('c_reset_iti'))){
        clearItinerary(); DAYS=deepClone(DEFAULT_DAYS); customized=false;
        var cc=document.getElementById('custChip'); if(cc) cc.remove();
        renderPlaces(); renderPlan(); destroyMap();
      } break;
    case 'editday': openDayEditor(di); break;
    case 'delday':
      if(DAYS.length<=1){ alert(t('a_last_day')); break; }
      if(confirm(t('c_del_day'))){ DAYS.splice(di,1); commit(); } break;
    case 'dayup': if(di>0){ swap(DAYS,di,di-1); commit(); } break;
    case 'daydown': if(di<DAYS.length-1){ swap(DAYS,di,di+1); commit(); } break;
    case 'addstop':
      DAYS[di].stops.push({t:'',kr:'새 일정',en:'New stop',id:newId()}); openState[di]=true; commit(); break;
    case 'editstop': openStopEditor(di,si); break;
    case 'delstop': if(confirm(t('c_del_stop'))){ DAYS[di].stops.splice(si,1); commit(); } break;
    case 'stopup': if(si>0){ swap(DAYS[di].stops,si,si-1); commit(); } break;
    case 'stopdown': if(si<DAYS[di].stops.length-1){ swap(DAYS[di].stops,si,si+1); commit(); } break;
  }
}

      +'<div><label>'+t('m_lng')+'</label><input id="st_lng" inputmode="decimal" value="'+(s.lng!=null?s.lng:'')+'" placeholder="151.2153"></div></div>'
    +'<div class="fld"><label>'+t('m_pid')+'</label><input id="st_pid" value="'+esc(s.pid||'')+'" placeholder=""></div>'
    +'<label class="cbox" style="margin:2px 0 4px"><input type="checkbox" id="st_sub" '+(s.sub?'checked':'')+'> '+t('m_sub')+'</label>'
    +'<p class="sc" style="margin:6px 0 0">'+t('m_geo_note')+'</p>'
    +'<div class="actions"><button data-mact="cancel">'+t('m_cancel')+'</button><button class="save" data-mact="savestop">'+t('m_save')+'</button></div>';
  sheet.dataset.di=di; sheet.dataset.si=si;
  showModal();
  document.getElementById('st_entry').addEventListener('change',function(){
    document.getElementById('st_paywrap').style.display=this.value==='pay'?'':'none';
  });
  var tp=document.getElementById('st_tp');
  if(tp) tp.addEventListener('change',function(){ if(this.value) document.getElementById('st_t').value=this.value; });
}
function saveStop(){
  var di=+sheet.dataset.di, si=+sheet.dataset.si, s=DAYS[di].stops[si];
  s.t=val('st_t'); s.kr=val('st_kr')||t('noname'); s.en=val('st_en');
  var mv=val('st_mv'); if(mv) s.mv=mv; else delete s.mv;
  var entry=val('st_entry');
  if(entry==='free'){ s.free=1; delete s.pay; }
  else if(entry==='pay'){ s.pay=val('st_pay')||'유료'; delete s.free; }
  else { delete s.free; delete s.pay; }
  if(document.getElementById('st_sub').checked){ s.sub=1; delete s.lat; delete s.lng; }
  else {
    delete s.sub;
    var lat=parseFloat(val('st_lat')), lng=parseFloat(val('st_lng'));
    if(!isNaN(lat)&&!isNaN(lng)){ s.lat=lat; s.lng=lng; } else { delete s.lat; delete s.lng; }
  }
  var pid=val('st_pid'); if(pid) s.pid=pid; else delete s.pid;
  if(!s.id) s.id=newId();
  hideModal(); commit();
}
function openDayEditor(di){
  var d=DAYS[di];
  sheet.innerHTML='<h3>'+t('m_day_title')+' · Day '+(di+1)+'</h3>'
    +'<div class="fld"><label>'+t('m_date')+'</label>'
      +'<div style="display:flex;gap:8px;align-items:center">'
      +'<input id="dy_date" value="'+esc(d.date||'')+'" placeholder="6/21 (일·Sun)" style="flex:1">'
      +'<input type="date" id="dy_dp" value="'+dateToISO(d.date)+'" aria-label="date" style="flex:0 0 auto;width:46%">'
      +'</div></div>'
    +fldArea(t('m_theme_ko'),'dy_tk',d.tk||'','')
    +fldArea(t('m_theme_en'),'dy_te',d.te||'','')
    +fldArea(t('m_cap'),'dy_cap',d.cap||'','')
    +'<div class="actions"><button data-mact="cancel">'+t('m_cancel')+'</button><button class="save" data-mact="saveday">'+t('m_save')+'</button></div>';
  sheet.dataset.di=di;
  showModal();
  var dp=document.getElementById('dy_dp');
  if(dp) dp.addEventListener('change',function(){ if(this.value) document.getElementById('dy_date').value=fmtKDate(this.value); });
}
function saveDay(){
  var di=+sheet.dataset.di, d=DAYS[di];
  d.date=val('dy_date'); d.tk=val('dy_tk')||'테마'; d.te=val('dy_te'); d.cap=val('dy_cap');
  hideModal(); commit();
}
modal.addEventListener('click',function(e){
  if(e.target===modal){ hideModal(); return; }
  var b=e.target.closest('button[data-mact]'); if(!b) return;
  var a=b.dataset.mact;
  if(a==='cancel') hideModal();
  else if(a==='savestop') saveStop();
  else if(a==='saveday') saveDay();
});

/* ---------- places (recommended-spot list) ---------- */
var PLACE_INDEX={}; var PLACE_TOTAL=0; var onlyRemaining=false;
function renderPlaces(){
  var host=document.getElementById('placelist'); if(!host) return;
  PLACE_INDEX={}; host.innerHTML=''; var total=0;
  DAYS.forEach(function(day,di){
    var col=DAYCOLORS[di%8]; var items='';
    day.stops.forEach(function(s){
      if(s.sub || s.lat==null) return;
      var id=s.id; total++;
      PLACE_INDEX[id]={lat:s.lat,lng:s.lng};
      var freeTag=s.free?'<span class="tagfree">FREE</span>':'';
      var payTag=s.pay?'<span class="tagfree" style="color:#9A5B1A;background:#FBEFD9">'+esc(s.pay)+'</span>':'';
      var coords=(+s.lat).toFixed(4)+', '+(+s.lng).toFixed(4);
      items+='<div class="place'+(isOn(id)?' done':'')+'" id="prow_'+id+'" data-pid="'+id+'">'
        +'<label class="pchk"><input type="checkbox" data-id="'+id+'" '+(isOn(id)?'checked':'')+' aria-label="visit"></label>'
        +'<div class="pbody">'
        +'<div class="pnm">'+esc(lp(s.kr,s.en))+freeTag+payTag+'</div>'
        +'<div class="pen">'+esc(ls(s.kr,s.en))+'</div>'
        +'<div class="pmeta"><span>📅 '+esc(day.d)+(s.t&&s.t!=='코스'?(' · '+esc(s.t)):'')+'</span><span class="geo">📌 '+coords+'</span></div>'
        +'<div class="pacts">'
        +'<a class="bsm gmap" target="_blank" rel="noopener" href="'+g(s.en||s.kr,s.pid)+'">'+t('gmap_open')+'</a>'
        +'<button class="bsm onmap" type="button" data-mapid="'+id+'">'+t('view_map')+'</button>'
        +'</div></div></div>';
    });
    if(!items) return;
    var sec=document.createElement('div'); sec.className='pday';
    sec.innerHTML='<div class="ph"><span class="pdot" style="background:'+col+'"></span>'
      +'<span class="pt">'+esc(day.d)+' · '+esc(lp(day.tk,day.te))+'</span><span class="pte">'+esc(day.date)+'</span></div>'+items;
    host.appendChild(sec);
  });
  PLACE_TOTAL=total;
  refreshPlaces();
}
function refreshPlaces(){
  var sumEl=document.getElementById('psumtxt'); if(!sumEl) return;
  var done=0;
  document.querySelectorAll('.place').forEach(function(el){
    var checked=isOn(el.dataset.pid); if(checked) done++;
    el.classList.toggle('done',checked);
    el.classList.toggle('hidden', onlyRemaining && checked);
  });
  sumEl.innerHTML=esc(t('places_sum')).replace('{t}','<b>'+PLACE_TOTAL+'</b>').replace('{d}','<b>'+done+'</b>');
  var po=document.getElementById('ponly'); if(po) po.textContent=onlyRemaining?t('ponly_off'):t('ponly_on');
  document.querySelectorAll('.pday').forEach(function(s){
    s.classList.toggle('hidden', s.querySelectorAll('.place:not(.hidden)').length===0);
  });
}
var placesPanel=document.getElementById('places');
placesPanel.addEventListener('change',function(e){
  if(e.target.matches('input[type=checkbox]')){ setStop(e.target.dataset.id, e.target.checked); }
});
placesPanel.addEventListener('click',function(e){
  var b=e.target.closest('[data-mapid]'); if(b){ openOnMap(b.dataset.mapid); }
});
document.getElementById('ponly').addEventListener('click',function(){
  onlyRemaining=!onlyRemaining; this.classList.toggle('on',onlyRemaining);
  refreshPlaces();
});

/* ---------- checklist ---------- */
function buildList(ulId,items,prefix){
  var ul=document.getElementById(ulId); ul.innerHTML='';
  items.forEach(function(it,i){
    var id=prefix+i; var li=document.createElement('li'); if(isOn(id)) li.className='done';
    li.innerHTML='<input type="checkbox" data-cid="'+id+'" '+(isOn(id)?'checked':'')+'><span class="t">'+esc(lp(it[0],it[1]))+'<span class="en">'+esc(ls(it[0],it[1]))+'</span></span>';
    ul.appendChild(li);
  });
}
function renderChecklists(){ buildList('prep',PREP,'p'); buildList('pack',PACK,'k'); }
function renderTips(){
  var el=document.getElementById('tips'); el.innerHTML='';
  TIPS.forEach(function(tp){ el.innerHTML+='<div class="tip"><b>'+esc(tp[0])+'</b> '+esc(lp(tp[1],tp[2]))+'<span class="en">'+esc(ls(tp[1],tp[2]))+'</span></div>'; });
}
document.getElementById('check').addEventListener('change',function(e){
  if(e.target.matches('input[type=checkbox]')){
    var id=e.target.dataset.cid; setOn(id,e.target.checked);
    e.target.closest('li').classList.toggle('done',e.target.checked);
  }
});
document.getElementById('reset').addEventListener('click',function(){
  if(confirm(t('c_reset_checks'))){ STATE={}; save(STATE); location.reload(); }
});

/* ---------- tabs ---------- */
document.querySelectorAll('.tab').forEach(function(tb){
  tb.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active')});
    tb.classList.add('active');
    var name=tb.dataset.tab;
    document.getElementById('plan').classList.toggle('active',name==='plan');
    document.getElementById('places').classList.toggle('active',name==='places');
    document.getElementById('map-panel').classList.toggle('active',name==='map');
    document.getElementById('check').classList.toggle('active',name==='check');
    if(name==='map'){ initMap(); }
  });
});

/* ---------- map (Leaflet + OSM) ---------- */
var map, mapInited=false, layersByDay={}, markersById={};
function destroyMap(){
  if(map){ try{map.remove();}catch(e){} }
  map=null; mapInited=false; markersById={}; layersByDay={};
  var el=document.getElementById('map'); if(el) el.innerHTML='';
  var lg=document.getElementById('legend'); if(lg) lg.innerHTML='';
}
function openOnMap(id){
  var tabBtn=document.querySelector('.tab[data-tab="map"]'); if(tabBtn) tabBtn.click();
  setTimeout(function(){
    if(typeof L==='undefined'||!map) return;
    var mk=markersById[id], p=PLACE_INDEX[id];
    if(mk){
      if(mk._grp && !map.hasLayer(mk._grp)){ mk._grp.addTo(map); var lg=document.querySelector('.lg[data-di="'+mk._di+'"]'); if(lg) lg.classList.remove('off'); }
      map.setView(mk.getLatLng(),15); mk.openPopup();
    } else if(p){ map.setView([p.lat,p.lng],15); }
  },220);
}
function initMap(){
  if(mapInited){ if(map) setTimeout(function(){map.invalidateSize()},60); return; }
  mapInited=true;
  if(typeof L==='undefined'){ document.getElementById('map').innerHTML='<div style="padding:20px;color:#5E7681;font-size:13px">'+esc(t('map_offline'))+'</div>'; return; }
  map=L.map('map',{scrollWheelZoom:true}).setView([-33.86,151.21],11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
  var legend=document.getElementById('legend'); var bounds=[];
  DAYS.forEach(function(day,di){
    var col=DAYCOLORS[di%8]; var grp=L.layerGroup().addTo(map); layersByDay[di]=grp; var cnt=0;
    day.stops.forEach(function(s){
      if(s.sub || s.lat==null) return; bounds.push([s.lat,s.lng]); cnt++;
      var mk=L.circleMarker([s.lat,s.lng],{radius:9,color:'#fff',weight:2,fillColor:col,fillOpacity:1});
      mk.bindPopup('<b>'+esc(String(lp(s.kr,s.en)).split(' — ')[0])+'</b><br><span style="color:#5E7681;font-size:12px">'+esc(day.d)+' · '+esc(s.t)+'</span><br><a target="_blank" rel="noopener" href="'+g(s.en||s.kr,s.pid)+'">'+esc(t('gmap_popup'))+'</a>');
      mk.addTo(grp); mk._grp=grp; mk._di=di; markersById[s.id]=mk;
    });
    if(!cnt) return;
    var lg=document.createElement('button'); lg.className='lg'; lg.dataset.di=di;
    lg.innerHTML='<span class="sw" style="background:'+col+'"></span>'+(di+1)+'. '+esc(String(lp(day.tk,day.te)).split(' ')[0]);
    lg.addEventListener('click',function(){
      lg.classList.toggle('off');
      if(map.hasLayer(grp)){map.removeLayer(grp);}else{grp.addTo(map);}
    });
    legend.appendChild(lg);
  });
  if(bounds.length) map.fitBounds(bounds,{padding:[30,30]});
  setTimeout(function(){map.invalidateSize()},80);
}

/* ---------- language application ---------- */
function applyLang(){
  document.documentElement.lang=lang;
  document.body.classList.toggle('lang-en', lang==='en');
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var k=el.getAttribute('data-i18n'); if(T[lang][k]!=null) el.textContent=T[lang][k];
  });
  document.querySelectorAll('#langsw button').forEach(function(b){ b.classList.toggle('on', b.dataset.lang===lang); });
  renderChips(); renderChecklists(); renderTips(); renderPlaces(); renderPlan();
  destroyMap();
  if(document.getElementById('map-panel').classList.contains('active')) initMap();
}
document.getElementById('langsw').addEventListener('click',function(e){
  var b=e.target.closest('button[data-lang]'); if(!b || b.dataset.lang===lang) return;
  lang=b.dataset.lang; saveLang(lang); applyLang();
});

/* ---------- boot ---------- */
applyLang();
</script>
